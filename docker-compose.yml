services:

  # ------------------------------------------------------------------
  # elektron-net full node -- node1.elektron-net.org
  # P2P port 8333 is public (this is your seed node). RPC 8332 is only
  # on the "backend" network, never published to the host.
  # ------------------------------------------------------------------
  elektron-net:
    container_name: elektron-net
    build:
      context: ./elektron-net
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "8333:8333"
    volumes:
      - "./elektron-net/bitcoin.conf:/data/bitcoin.conf:ro"
      - "./data/elektron-net:/data"

  # ------------------------------------------------------------------
  # PPLNS pool backend -- pplns.elektron-net.org (via ppool-ui's proxy)
  # Stratum 3333 public (miners connect directly). API 3334 stays
  # internal; only elektron-ppool-ui talks to it.
  # ------------------------------------------------------------------
  elektron-ppool:
    container_name: elektron-ppool
    build:
      context: ./elektron-net-ppool
    restart: unless-stopped
    depends_on:
      - elektron-net
    networks:
      - backend
    ports:
      - "3333:3333"
    volumes:
      - "./elektron-net-ppool/.env:/elektron-pool/.env:ro"
      - "./data/ppool-DB:/elektron-pool/DB"

  # ------------------------------------------------------------------
  # PPLNS pool UI -- reverse-proxied by Caddy at pplns.elektron-net.org.
  # Not published to the host directly; Caddy reaches it on "web".
  # ------------------------------------------------------------------
  elektron-ppool-ui:
    container_name: elektron-ppool-ui
    build:
      context: ./elektron-net-ppool-ui
    restart: unless-stopped
    depends_on:
      - elektron-ppool
    networks:
      - backend
      - web
    environment:
      - API_UPSTREAM=elektron-ppool:3334

  # ------------------------------------------------------------------
  # Faucet -- reverse-proxied by Caddy at faucet.elektron-net.org
  # ------------------------------------------------------------------
  elektron-faucet-db:
    container_name: elektron-faucet-db
    image: mariadb:11.4
    restart: unless-stopped
    env_file: ./elektron-net-faucet/.env
    environment:
      MYSQL_DATABASE: ${FAUCET_DB_NAME}
      MYSQL_USER: ${FAUCET_DB_USER}
      MYSQL_PASSWORD: ${FAUCET_DB_PASS}
      MYSQL_ROOT_PASSWORD: ${FAUCET_DB_ROOT_PASS}
    networks:
      - backend
    volumes:
      - "./data/faucet-db:/var/lib/mysql"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  elektron-faucet-app:
    container_name: elektron-faucet-app
    build:
      context: ./elektron-net-faucet
    restart: unless-stopped
    depends_on:
      elektron-faucet-db:
        condition: service_healthy
      elektron-net:
        condition: service_started
    env_file: ./elektron-net-faucet/.env
    environment:
      FAUCET_CONFIG: /config/config.php
    networks:
      - backend
      - web
    volumes:
      - "./data/faucet-config:/config"

  # ------------------------------------------------------------------
  # Seeder -- DNS seed crawler. OPTIONAL/testing (see README): the
  # "seeder" profile keeps it out of a plain "docker compose up -d".
  # Bound to this server's own public IPs (not the 0.0.0.0 wildcard) so
  # it doesn't collide with systemd-resolved's loopback-only stub on the
  # same host. install-elektron-stack.sh fills in <SERVER_IP>/<SERVER_IPV6>
  # from elektron-stack.conf automatically -- replace them yourself if
  # deploying this file directly without the script.
  # ------------------------------------------------------------------
  elektron-net-seeder:
    container_name: elektron-net-seeder
    profiles:
      - seeder
    build:
      context: ./elektron-net-seeder
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "<SERVER_IP>:53:53/udp"
      - "<SERVER_IP>:53:53/tcp"
      - "[<SERVER_IPV6>]:53:53/udp"
      - "[<SERVER_IPV6>]:53:53/tcp"
    env_file: ./elektron-net-seeder/.env
    volumes:
      - "./data/elektron-net-seeder:/data"

  # ------------------------------------------------------------------
  # Mempool Explorer -- reverse-proxied by Caddy at mempool.elektron-net.org
  # (mempool.space fork). OPTIONAL (see README): the "mempool" profile keeps
  # it out of a plain "docker compose up -d" when INSTALL_MEMPOOL=false.
  # No new public port -- same Caddy-only pattern as the pool UI and faucet.
  # backend/frontend build contexts don't exist until
  # install-elektron-stack.sh stages them from elektron-net-mempool/docker/
  # (mirrors upstream's own docker/init.sh).
  # ------------------------------------------------------------------
  elektron-mempool-db:
    container_name: elektron-mempool-db
    image: mariadb:11.4
    restart: unless-stopped
    profiles:
      - mempool
    env_file: ./elektron-net-mempool/.env
    networks:
      - backend
    volumes:
      - "./data/mempool-db:/var/lib/mysql"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  elektron-mempool-api:
    container_name: elektron-mempool-api
    profiles:
      - mempool
    build:
      context: ./elektron-net-mempool/backend
      additional_contexts:
        - "backend=./elektron-net-mempool/backend"
        - "rustgbt=./elektron-net-mempool/rust"
      args:
        commitHash: "local"
    restart: unless-stopped
    depends_on:
      elektron-net:
        condition: service_started
      elektron-mempool-db:
        condition: service_healthy
    networks:
      - backend
    env_file: ./elektron-net-mempool/.env
    volumes:
      - "./data/mempool-cache:/backend/cache"

  elektron-mempool-web:
    container_name: elektron-mempool-web
    profiles:
      - mempool
    build:
      context: ./elektron-net-mempool/frontend
    restart: unless-stopped
    depends_on:
      - elektron-mempool-api
    networks:
      - backend
      - web
    env_file: ./elektron-net-mempool/.env

  # ------------------------------------------------------------------
  # Caddy -- single public entrypoint, automatic HTTPS for both
  # web-facing subdomains.
  # ------------------------------------------------------------------
  caddy:
    container_name: elektron-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./caddy/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "caddy_data:/data"
      - "caddy_config:/config"

networks:
  # Node RPC, pool backend, faucet DB/app, mempool DB/API -- never exposed to the host.
  backend:
  # Only what Caddy needs to reach: the web-facing UIs.
  web:

volumes:
  caddy_data:
  caddy_config:
